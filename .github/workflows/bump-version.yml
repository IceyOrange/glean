name: Bump version & Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  bump-and-release:
    if: "!contains(github.event.head_commit.message, '[skip ci]') && !contains(github.event.head_commit.message, 'bump version')"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump patch version
        run: npm version patch --no-git-tag-version

      - name: Commit and push
        run: |
          git add package.json package-lock.json
          git commit -m "chore(release): bump version [skip ci]"
          git push

      - name: Install dependencies
        run: npm ci

      - name: Build & zip (Chrome)
        run: npm run zip

      - name: Build & zip (Firefox)
        run: npm run zip:firefox

      - name: Get version
        id: version
        run: echo "version=v$(node -p 'require("./package.json").version')" >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            .output/glean-*-chrome.zip
            .output/glean-*-firefox.zip
